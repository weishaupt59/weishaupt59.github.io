<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>weishaupt59 · index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Martian+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117;
    --panel:#11161d;
    --panel-2:#0a0e13;
    --line:#1f2730;
    --line-soft:#161c24;
    --txt:#c9d4e0;
    --txt-dim:#5c6b7a;
    --txt-faint:#3a4753;
    --accent:#5ef2a0;
    --accent-dim:#2c8f5e;
    --html:#e3a857;
    --folder:#6cb6ff;
    --glow:0 0 0 1px var(--line), 0 24px 60px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(94,242,160,.06), transparent 60%),
      radial-gradient(700px 400px at 0% 110%, rgba(108,182,255,.05), transparent 55%),
      var(--bg);
    color:var(--txt);
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:14px;
    line-height:1.5;
    min-height:100%;
    padding:clamp(16px,4vw,56px);
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;opacity:.6;
  }
  .wrap{max-width:920px;margin:0 auto;position:relative;z-index:1}

  header{margin-bottom:26px}
  .titlebar{
    display:flex;align-items:center;gap:9px;margin-bottom:18px;
    color:var(--txt-dim);font-size:12px;letter-spacing:.04em;
  }
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}

  h1{
    font-family:'Martian Mono', monospace;font-weight:600;
    font-size:clamp(22px,5vw,34px);letter-spacing:-.02em;line-height:1.1;
    color:#fff;margin-bottom:6px;
  }
  h1 .at{color:var(--accent)}
  .sub{color:var(--txt-dim);font-size:13px}
  .sub b{color:var(--txt);font-weight:500}

  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:24px 0 14px}
  .crumbs{
    flex:1 1 auto;min-width:0;display:flex;align-items:center;gap:7px;
    font-size:13px;color:var(--txt-dim);overflow:auto;white-space:nowrap;scrollbar-width:none;
  }
  .crumbs::-webkit-scrollbar{display:none}
  .crumbs .seg{color:var(--folder);cursor:pointer;text-decoration:none}
  .crumbs .seg:hover{text-decoration:underline}
  .crumbs .sep{color:var(--txt-faint)}
  .crumbs .cur{color:var(--txt)}
  .prompt{color:var(--accent-dim)}

  .search{flex:0 0 auto;position:relative}
  .search input{
    background:var(--panel-2);border:1px solid var(--line);color:var(--txt);
    font-family:inherit;font-size:12.5px;padding:8px 12px 8px 30px;border-radius:8px;
    width:200px;outline:none;transition:border-color .15s, box-shadow .15s;
  }
  .search input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(94,242,160,.08)}
  .search input::placeholder{color:var(--txt-faint)}
  .search .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt-faint);font-size:13px}

  .panel{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--glow);
  }
  .col-head{
    display:grid;grid-template-columns:1fr 88px 130px;gap:14px;padding:11px 18px;
    font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--txt-faint);
    border-bottom:1px solid var(--line);background:rgba(255,255,255,.012);
  }
  .col-head .r{text-align:right}

  .row{
    display:grid;grid-template-columns:1fr 88px 130px;gap:14px;padding:12px 18px;
    align-items:center;text-decoration:none;color:inherit;border-bottom:1px solid var(--line-soft);
    position:relative;cursor:pointer;animation:rise .4s ease both;
  }
  .row:last-child{border-bottom:none}
  .row::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
    background:var(--accent);transform:scaleY(0);transition:transform .18s;
  }
  .row:hover{background:rgba(94,242,160,.045)}
  .row:hover::before{transform:scaleY(1)}
  .name{display:flex;align-items:center;gap:11px;min-width:0}
  .ic-file{flex:none;width:20px;height:20px;display:grid;place-items:center;font-size:14px}
  .ic-file.folder{color:var(--folder)}
  .ic-file.html{color:var(--html)}
  .ic-file.other{color:var(--txt-dim)}
  .fname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px;color:var(--txt)}
  .row:hover .fname{color:#fff}
  .badge{
    flex:none;font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(--line);
    color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;
  }
  .size,.type{font-size:12px;color:var(--txt-dim);text-align:right}
  .type{text-transform:uppercase;letter-spacing:.06em;font-size:11px}

  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .state{padding:54px 24px;text-align:center;color:var(--txt-dim)}
  .state .big{font-size:34px;margin-bottom:14px;opacity:.5}
  .state p{font-size:13px;max-width:430px;margin:0 auto 6px}
  .state code{color:var(--accent);background:var(--panel-2);padding:2px 6px;border-radius:5px}
  .blink{animation:blink 1.1s steps(2) infinite}
  @keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}

  footer{
    margin-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
    color:var(--txt-faint);font-size:11.5px;letter-spacing:.02em;
  }
  footer a{color:var(--txt-dim);text-decoration:none}
  footer a:hover{color:var(--accent)}

  @media(max-width:560px){
    .col-head .type-h,.row .type{display:none}
    .col-head,.row{grid-template-columns:1fr 78px}
    .search input{width:140px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span id="bar-host">— ~</span>
    </div>
    <h1><span class="at">~</span>/<span id="repo-name">repository</span></h1>
    <p class="sub">Indice dei contenuti · generato dinamicamente da <b>GitHub</b></p>
  </header>

  <div class="toolbar">
    <div class="crumbs" id="crumbs"><span class="prompt">$ ls</span></div>
    <div class="search">
      <span class="ic">⌕</span>
      <input id="filter" type="text" placeholder="filtra…" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="panel">
    <div class="col-head">
      <div>Nome</div>
      <div class="r">Dimensione</div>
      <div class="r type-h">Tipo</div>
    </div>
    <div id="list">
      <div class="state">
        <div class="big blink">▍</div>
        <p>Lettura della directory in corso…</p>
      </div>
    </div>
  </div>

  <footer>
    <span id="count">—</span>
    <span>Aggiornato ad ogni caricamento · nessuna manutenzione richiesta</span>
  </footer>
</div>

<script>
(function(){
  // --- Rileva owner/repo dal dominio (portabile su altri siti GitHub Pages) ---
  var host = location.hostname;                 // es. weishaupt59.github.io
  var owner = host.split('.')[0] || 'weishaupt59';
  var repo  = host.indexOf('github.io') >= 0 ? host : (owner + '.github.io');

  // Fallback se aperto in locale (file://) senza dominio github.io
  if(!host || host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:'){
    owner = 'weishaupt59';
    repo  = 'weishaupt59.github.io';
  }

  // File da NON mostrare nell'elenco
  var HIDDEN = ['index.html', 'README.md', 'CNAME', '.nojekyll', '.gitignore'];

  document.getElementById('repo-name').textContent = repo;
  document.getElementById('bar-host').textContent = '— ' + owner + '@github: ~';

  var listEl   = document.getElementById('list');
  var crumbsEl = document.getElementById('crumbs');
  var filterEl = document.getElementById('filter');
  var countEl  = document.getElementById('count');
  var current  = [];

  function currentPath(){
    var h = decodeURIComponent(location.hash.replace(/^#\/?/, ''));
    return h.replace(/^\/+|\/+$/g, '');
  }

  function humanSize(n){
    if(n === 0 || n == null) return '—';
    var u = ['B','KB','MB','GB']; var i = 0;
    while(n >= 1024 && i < u.length-1){ n/=1024; i++; }
    return (n < 10 && i > 0 ? n.toFixed(1) : Math.round(n)) + ' ' + u[i];
  }

  function iconFor(item){
    if(item.type === 'dir') return {cls:'folder', ch:'▸', label:'dir'};
    var ext = (item.name.split('.').pop() || '').toLowerCase();
    if(ext === 'html' || ext === 'htm') return {cls:'html', ch:'◆', label:'html'};
    if(ext === 'pdf') return {cls:'other', ch:'▤', label:'pdf'};
    if(['png','jpg','jpeg','gif','svg','webp'].indexOf(ext) >= 0) return {cls:'other', ch:'▣', label:'img'};
    if(['md','txt'].indexOf(ext) >= 0) return {cls:'other', ch:'≡', label:ext};
    return {cls:'other', ch:'•', label:ext || 'file'};
  }

  function buildCrumbs(path){
    crumbsEl.innerHTML = '<span class="prompt">$ ls</span>';
    var root = document.createElement('a');
    root.className = 'seg'; root.textContent = '~'; root.href = '#/';
    crumbsEl.appendChild(root);
    if(!path) return;
    var parts = path.split('/'); var acc = '';
    parts.forEach(function(p, i){
      acc += (i ? '/' : '') + p;
      var sep = document.createElement('span'); sep.className = 'sep'; sep.textContent = '/';
      crumbsEl.appendChild(sep);
      if(i === parts.length - 1){
        var cur = document.createElement('span'); cur.className = 'cur'; cur.textContent = p;
        crumbsEl.appendChild(cur);
      }else{
        var a = document.createElement('a'); a.className = 'seg'; a.textContent = p;
        a.href = '#/' + acc; crumbsEl.appendChild(a);
      }
    });
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function render(items){
    var q = filterEl.value.trim().toLowerCase();
    var shown = items.filter(function(it){
      return !q || it.name.toLowerCase().indexOf(q) >= 0;
    });

    if(shown.length === 0){
      listEl.innerHTML = '<div class="state"><div class="big">∅</div><p>'
        + (q ? 'Nessun file corrisponde a <code>' + escapeHtml(q) + '</code>.' : 'Questa cartella è vuota.')
        + '</p></div>';
      countEl.textContent = '0 elementi';
      return;
    }

    shown.sort(function(a, b){
      if(a.type !== b.type) return a.type === 'dir' ? -1 : 1;
      return a.name.localeCompare(b.name, 'it', {numeric:true});
    });

    var frag = document.createDocumentFragment();
    shown.forEach(function(it, i){
      var ic = iconFor(it);
      var row = document.createElement('a');
      row.className = 'row';
      row.style.animationDelay = (i * 0.025) + 's';

      if(it.type === 'dir'){
        row.href = '#/' + it.path;
      }else{
        row.href = location.origin + '/' + it.path.split('/').map(encodeURIComponent).join('/');
        if(!(it.name.split('.').pop() || '').toLowerCase().match(/^html?$/)){
          row.target = '_blank'; row.rel = 'noopener';
        }
      }

      row.innerHTML =
        '<div class="name">'
        +   '<span class="ic-file ' + ic.cls + '">' + ic.ch + '</span>'
        +   '<span class="fname">' + escapeHtml(it.name) + '</span>'
        +   (it.type === 'dir' ? '<span class="badge">dir</span>' : '')
        + '</div>'
        + '<div class="size">' + (it.type === 'dir' ? '—' : humanSize(it.size)) + '</div>'
        + '<div class="type">' + ic.label + '</div>';
      frag.appendChild(row);
    });
    listEl.innerHTML = '';
    listEl.appendChild(frag);

    var dirs = shown.filter(function(x){ return x.type === 'dir'; }).length;
    var files = shown.length - dirs;
    countEl.textContent = files + ' file' + (dirs ? ' · ' + dirs + ' cartelle' : '');
  }

  function showError(msg, detail){
    listEl.innerHTML = '<div class="state"><div class="big">⚠</div><p>' + msg + '</p>'
      + (detail ? '<p style="color:var(--txt-faint)">' + detail + '</p>' : '') + '</div>';
    countEl.textContent = '—';
  }

  function load(){
    var path = currentPath();
    buildCrumbs(path);
    listEl.innerHTML = '<div class="state"><div class="big blink">▍</div><p>Lettura della directory…</p></div>';

    var api = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/'
            + path.split('/').filter(Boolean).map(encodeURIComponent).join('/');

    fetch(api, {headers:{'Accept':'application/vnd.github+json'}})
      .then(function(r){
        if(r.status === 403) throw new Error('rate-limit');
        if(r.status === 404) throw new Error('not-found');
        if(!r.ok) throw new Error('http-' + r.status);
        return r.json();
      })
      .then(function(data){
        if(!Array.isArray(data)) throw new Error('not-dir');
        current = data.filter(function(it){
          return HIDDEN.indexOf(it.name) < 0 && it.name.charAt(0) !== '.';
        });
        render(current);
      })
      .catch(function(err){
        if(err.message === 'rate-limit'){
          showError('Limite di richieste GitHub raggiunto.', 'Riprova tra qualche minuto (max 60 richieste/ora per indirizzo IP).');
        }else if(err.message === 'not-found'){
          showError('Percorso non trovato.', 'La cartella <code>' + escapeHtml(path) + '</code> non esiste nel repository.');
        }else{
          showError('Impossibile contattare GitHub.', 'Controlla la connessione e riprova.');
        }
      });
  }

  filterEl.addEventListener('input', function(){ render(current); });
  window.addEventListener('hashchange', load);
  load();
})();
</script>
</body>
</html>
